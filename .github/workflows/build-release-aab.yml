name: Build Release AAB

# Manual only — a signed release build is a deliberate action, not
# something that should fire on every push like the debug APK workflow.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: dart run build_runner build --delete-conflicting-outputs

      # Reconstructs the upload keystore + key.properties from GitHub
      # Actions secrets — neither is committed to the repo (see
      # android/.gitignore + PROJECT_CONTEXT.md §6). Both are deleted at
      # the end of the job regardless of build outcome.
      - name: Restore upload keystore
        run: |
          mkdir -p android/keystores
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\n\r ' | base64 --decode > android/keystores/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=../keystores/upload-keystore.jks
          EOF

      # -t main_production.dart: lib/main.dart (the default entry point)
      # hardcodes Environment.development, which would ship the debug
      # banner, "(Dev)" title suffix, and disabled Crashlytics reporting
      # even in this signed release build.
      - run: flutter build appbundle --release -t lib/main_production.dart

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Clean up signing secrets
        if: always()
        run: rm -f android/keystores/upload-keystore.jks android/key.properties
