name: carvault
description: >
  CarVault — Vehicle Document Manager. Photograph, organize, and instantly
  retrieve every document tied to a vehicle.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # State management + dependency injection
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # Local storage
  drift: ^2.21.0
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.5
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  rxdart: ^0.28.0

  # Document capture
  image_picker: ^1.1.2

  # Networking (built, not yet called by any screen — see NOTES.md)
  dio: ^5.7.0

  # Logging
  logger: ^2.4.0

  cupertino_icons: ^1.0.8

  # Firebase — real auth, replacing FakeAuthRepository
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  firebase_crashlytics: ^4.1.5
  google_sign_in: ^6.2.2

  # Google Drive backup
  archive: ^3.6.1
  googleapis: ^13.2.0
  googleapis_auth: ^2.3.3
  extension_google_sign_in_as_googleapis_auth: ^2.0.13
  workmanager: ^0.9.0+3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.21.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
